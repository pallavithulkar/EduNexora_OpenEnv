name: EduNexoraEnv
version: "1.0.0"
description: >
  EduNexora AI OpenEnv system — a production-grade reinforcement learning
  environment for educational analytics covering student performance analysis,
  syllabus intelligence, and early intervention.

env_class: env.EduNexoraEnv
env_name: EduNexoraEnv-v1

tasks:
  - id: student_analysis
    name: "Task 1: Student Performance Analysis"
    difficulty: easy
    description: >
      Classify students as pass/fail/backlog based on their marks
      and generate a ranked leaderboard.
    observation_space:
      - students: list of student records with marks and subject scores
    action_space:
      - classify_student:
          params:
            student_id: str
            classification: "pass | fail | backlog"
      - generate_ranking:
          params: {}
    reward:
      correct_classification: 1.0
      incorrect_classification: 0.0
      correct_ranking: 0.5
    termination: all students classified

  - id: syllabus_tracking
    name: "Task 2: Syllabus Intelligence"
    difficulty: medium
    description: >
      Monitor unit-wise syllabus completion, prioritize lagging units,
      mark topics complete, and generate actionable notifications.
    observation_space:
      - syllabus: unit structure with topic completion status
      - progress_pct: overall completion percentage
    action_space:
      - prioritize_unit:
          params:
            unit_id: str
      - mark_topic_complete:
          params:
            topic_id: str
      - generate_notification:
          params: {}
    reward:
      correct_prioritization: 0.5
      wrong_prioritization: 0.2
      full_completion: 1.0
      notification_generated: 0.5
    termination: all topics marked complete OR max_steps reached

  - id: early_intervention
    name: "Task 3: Early Intervention"
    difficulty: hard
    description: >
      Assess student risk levels (high/medium/low) and assign
      appropriate intervention strategies to at-risk students.
    observation_space:
      - students: list of student records with marks
    action_space:
      - classify_risk:
          params:
            student_id: str
            risk_level: "high | medium | low"
      - assign_intervention:
          params:
            student_id: str
    reward:
      correct_risk_classification: 1.0
      correct_intervention: 0.5
      incorrect_classification: 0.0
    termination: all students classified and assigned

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  log_format:
    start: "[START] task=<task_name> env=<env_name> model=<model_name>"
    step:  "[STEP] step=<n> action=<action> reward=<reward> done=<true/false> error=<null>"
    end:   "[END] success=<true/false> steps=<n> rewards=<r1,r2,...>"

frontend:
  framework: flask
  entry: app.py
  port: 7860
  features:
    - dashboard
    - file_upload
    - real_data_mode
    - csv_parsing
    - pdf_parsing

docker:
  base_image: python:3.11-slim
  port: 7860
  hf_spaces_compatible: true